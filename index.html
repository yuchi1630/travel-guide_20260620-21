<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅のしおり</title>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            font-family: "Helvetica", "Yu Gothic", sans-serif;
            margin: 0;
            padding: 0;
            background: #f7f7f7;
            color: #333;
        }
        header {
            background: #4CAF50;
            color: white;
            padding: 20px;
            text-align: center;
        }
        section {
            padding: 20px;
            background: white;
            margin: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h2 {
            border-left: 5px solid #4CAF50;
            padding-left: 10px;
        }
        ul {
            padding-left: 20px;
        }
        .day {
            font-weight: bold;
            margin-top: 10px;
        }
        a {
            color: #4CAF50;
        }

        /* トップスライドショー */
        #top-slideshow {
            width: 100%;
            height: 250px;
            background: #ddd;
            position: relative;
            overflow: hidden;
        }
        #top-slideshow img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            position: absolute;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        /* グリッド一覧 */
        #photo-gallery .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }
        #photo-gallery img {
            width: 100%;
            border-radius: 8px;
            object-fit: cover;
        }
    </style>
</head>
<body>

<header>
    <h1>旅のしおり</h1>
    <p>◯◯旅行｜2025年3月12日〜14日</p>
</header>

<!-- 🔥 トップスライドショー -->
<div id="top-slideshow"></div>

<section>
    <h2>📅 日程</h2>

    <div class="day">Day 1（3/12）</div>
    <ul>
        <li>10:00 集合</li>
        <li>12:00 ランチ（<a href="#">お店リンク</a>）</li>
        <li>15:00 観光スポットA</li>
    </ul>

    <div class="day">Day 2（3/13）</div>
    <ul>
        <li>09:00 ホテル出発</li>
        <li>11:00 観光スポットB</li>
        <li>18:00 夕食</li>
    </ul>
</section>

<section>
    <h2>📍 地図リンク</h2>
    <p><a href="https://maps.google.com" target="_blank">Google Map を開く</a></p>
</section>

<section>
    <h2>🎒 持ち物リスト</h2>
    <ul>
        <li>財布</li>
        <li>モバイルバッテリー</li>
        <li>着替え</li>
        <li>常備薬</li>
    </ul>
</section>

<section>
    <h2>🏨 宿泊情報</h2>
    <p>ホテル名：◯◯ホテル</p>
    <p>住所：東京都◯◯区◯◯</p>
    <p>チェックイン：15:00</p>
</section>

<!-- 🔥 写真アップロード -->
<section>
    <h2>📤 写真アップロード</h2>
    <input type="file" id="upload-file" multiple>
    <button id="upload-btn">アップロード</button>
    <p id="upload-status"></p>
</section>

<!-- 🔥 ページ最後のグリッド一覧 -->
<section id="photo-gallery">
    <h2>📸 旅行写真</h2>
    <div class="grid"></div>
</section>

<script>
const supabase = supabase.createClient(
    "https://exzwquntgcnnpzqsfwzq.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4endxdW50Z2NubnB6cXNmd3pxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MjAyNjIsImV4cCI6MjA5NTE5NjI2Mn0.qj4al6Ql2zPiu559vWRrzAt9jPnXick6CQkMIj9sTTk"
);

// ------------------------------
// 写真一覧取得（signed URL）
// ------------------------------
async function loadPhotos() {
    const { data, error } = await supabase.storage.from("photos").list("", {
        limit: 100,
        sortBy: { column: "name", order: "asc" }
    });

    if (error) return;

    const files = data.filter(f => f.name !== ".emptyFolderPlaceholder");

    // signed URL を生成（24時間有効）
    const urls = await Promise.all(
        files.map(async f => {
            const { data } = await supabase.storage
                .from("photos")
                .createSignedUrl(f.name, 60 * 60 * 24);
            return data.signedUrl;
        })
    );

    setupTopSlideshow(urls);
    setupGrid(urls);
}

// ------------------------------
// トップスライドショー
// ------------------------------
function setupTopSlideshow(urls) {
    const box = document.getElementById("top-slideshow");
    box.innerHTML = "";

    urls = shuffle(urls);

    urls.forEach((url, i) => {
        const img = document.createElement("img");
        img.src = url;
        if (i === 0) img.style.opacity = 1;
        box.appendChild(img);
    });

    let index = 0;
    setInterval(() => {
        const imgs = box.querySelectorAll("img");
        imgs.forEach(img => img.style.opacity = 0);
        index = (index + 1) % imgs.length;
        imgs[index].style.opacity = 1;
    }, 2500);
}

// ------------------------------
// グリッド一覧
// ------------------------------
function setupGrid(urls) {
    const grid = document.querySelector("#photo-gallery .grid");
    grid.innerHTML = "";

    urls.forEach(url => {
        const img = document.createElement("img");
        img.src = url;
        grid.appendChild(img);
    });
}

// ------------------------------
// 複数ファイルアップロード（安全ファイル名）
// ------------------------------
document.getElementById("upload-btn").onclick = async () => {
    const files = document.getElementById("upload-file").files;
    if (!files.length) return;

    let successCount = 0;

    for (const file of files) {
        // 日本語・絵文字対策：安全な英数字ファイル名に変換
        const ext = file.name.split('.').pop();
        const safeName = `${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;

        const { error } = await supabase.storage.from("photos").upload(safeName, file);

        if (!error) successCount++;
    }

    document.getElementById("upload-status").textContent =
        `${successCount}枚アップロード成功！`;

    loadPhotos();
};

// ------------------------------
// シャッフル関数
// ------------------------------
function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
}

// 初期ロード
loadPhotos();
</script>

</body>
</html>
