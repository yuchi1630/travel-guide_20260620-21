<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>さんこいち旅行 2026/06/20-21</title>

<style>
    body {
        margin: 0;
        font-family: sans-serif;
        background-attachment: fixed;
        background-size: cover;
        background-position: center;
        transition: background-image 0.8s ease-in-out;
        color: #fff;
    }

    /* パスワード画面 */
    #lock-screen {
        position: fixed;
        inset: 0;
        background: #111;
        color: #fff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
    }
    #lock-screen input {
        padding: 10px;
        font-size: 18px;
        border-radius: 8px;
        border: none;
        margin-top: 10px;
        text-align: center;
    }
    #lock-screen button {
        margin-top: 10px;
        padding: 10px 20px;
        font-size: 16px;
        border-radius: 8px;
        border: none;
        background: #4caf50;
        color: #fff;
    }

    /* セクション */
    section {
        min-height: 100vh;
        padding: 60px 20px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        backdrop-filter: brightness(0.75);
    }

    h2 {
        margin-bottom: 20px;
        font-size: 2rem;
        text-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }

    .content-box {
        background: rgba(0,0,0,0.35);
        padding: 20px;
        border-radius: 12px;
        backdrop-filter: blur(4px);
    }
</style>
</head>

<body>

<!-- パスワードロック -->
<div id="lock-screen">
    <div class="lock-box">
        <h2>合言葉を入力してね</h2>
        <input type="text" id="pass" placeholder="さんこいち">
        <button onclick="unlock()">OK</button>
    </div>
</div>

<style>
    #lock-screen {
        position: fixed;
        inset: 0;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(6px);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
    }

    .lock-box {
        background: #fff;
        padding: 30px 25px;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        text-align: center;
        width: 80%;
        max-width: 320px;
        animation: pop 0.4s ease;
    }

    @keyframes pop {
        0% { transform: scale(0.8); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
    }

    #lock-screen h2 {
        margin-bottom: 15px;
        color: #333;
        font-size: 1.3rem;
    }

    #lock-screen input {
        width: 100%;
        padding: 12px;
        font-size: 18px;
        border-radius: 10px;
        border: 1px solid #ccc;
        margin-bottom: 15px;
        text-align: center;
        outline: none;
    }

    #lock-screen button {
        width: 100%;
        padding: 12px;
        font-size: 16px;
        border-radius: 10px;
        border: none;
        background: #ff8fab;
        color: #fff;
        cursor: pointer;
        transition: 0.2s;
    }

    #lock-screen button:hover {
        background: #ff6f91;
    }
</style>

<script>
function unlock() {
    const p = document.getElementById("pass").value.trim();
    if (p === "さんこいち") {
        document.getElementById("lock-screen").style.display = "none";
    } else {
        alert("ちがうよ！");
    }
}
</script>


<!-- ここから本編 -->

<section>
    <h2>旅の概要</h2>
    <div class="content-box">
        <p>ここに旅の概要が入るよ。</p>
    </div>
</section>

<section>
    <h2>日程</h2>
    <div class="content-box">
        <p>ここに日程が入るよ。</p>
    </div>
</section>

<section>
    <h2>持ち物</h2>
    <div class="content-box">
        <p>ここに持ち物リストが入るよ。</p>
    </div>
</section>

<section>
    <h2>宿泊情報</h2>
    <div class="content-box">
        <p>ここに宿泊情報が入るよ。</p>
    </div>
</section>

<!-- 背景切り替えスクリプト -->
<script>
    const backgrounds = [
        "url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e')", // 海
        "url('https://images.unsplash.com/photo-1501785888041-af3ef285b470')", // 山
        "url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee')", // 街
        "url('https://images.unsplash.com/photo-1500048993959-dc65b0c31f52')"  // 夜景
    ];

    const sections = document.querySelectorAll("section");

    window.addEventListener("scroll", () => {
        let index = 0;

        sections.forEach((sec, i) => {
            const rect = sec.getBoundingClientRect();
            if (rect.top <= window.innerHeight * 0.5) {
                index = i;
            }
        });

        document.body.style.backgroundImage = backgrounds[index];
    });

    // 初期背景
    document.body.style.backgroundImage = backgrounds[0];
</script>

</body>
</html>
