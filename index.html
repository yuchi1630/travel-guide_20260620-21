<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>さんこいち旅行 2026/06/20-21</title>

<style>
    body {
        margin: 0;
        font-family: sans-serif;
        color: #fff;
        overflow-x: hidden;
    }

    /* 背景レイヤー（クロスフェード用） */
    .bg-layer {
        position: fixed;
        inset: 0;
        background-size: cover;
        background-position: center;
        z-index: -1;
        transition: opacity 1.2s ease-in-out;
        will-change: opacity;
    }
    #bg1 { opacity: 1; }
    #bg2 { opacity: 0; }

    /* パスワード画面（旅行っぽいデザイン） */
    #lock-screen {
        position: fixed;
        inset: 0;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(6px);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
    }

    .lock-box {
        background: #ffffff;
        padding: 30px 25px;
        border-radius: 18px;
        box-shadow: 0 6px 25px rgba(0,0,0,0.15);
        text-align: center;
        width: 85%;
        max-width: 340px;
        animation: pop 0.4s ease;
        border: 2px dashed #ffb6c1;
    }

    @keyframes pop {
        0% { transform: scale(0.8); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
    }

    .plane-icon {
        font-size: 40px;
        margin-bottom: 10px;
        color: #ff6f91;
    }

    #lock-screen h2 {
        margin-bottom: 10px;
        color: #333;
        font-size: 1.4rem;
    }

    #lock-screen p {
        margin-bottom: 15px;
        color: #666;
        font-size: 0.9rem;
    }

    #lock-screen input {
        width: 100%;
        padding: 12px;
        font-size: 18px;
        border-radius: 10px;
        border: 1px solid #ccc;
        margin-bottom: 15px;
        text-align: center;
        outline: none;
    }

    #lock-screen button {
        width: 100%;
        padding: 12px;
        font-size: 16px;
        border-radius: 10px;
        border: none;
        background: #ff8fab;
        color: #fff;
        cursor: pointer;
        transition: 0.2s;
    }

    #lock-screen button:hover {
        background: #ff6f91;
    }

    /* セクション */
    section {
        min-height: 100vh;
        padding: 60px 20px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        backdrop-filter: brightness(0.75);
    }

    h2 {
        margin-bottom: 20px;
        font-size: 2rem;
        text-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }

    .content-box {
        background: rgba(0,0,0,0.35);
        padding: 20px;
        border-radius: 12px;
        backdrop-filter: blur(4px);
    }
</style>
</head>

<body>

<!-- 背景レイヤー -->
<div id="bg1" class="bg-layer"></div>
<div id="bg2" class="bg-layer"></div>

<!-- パスワードロック（大人の搭乗券風デザイン） -->
<div id="lock-screen">
    <div class="lock-card">
        <div class="card-header">BOARDING PASS</div>

        <div class="card-body">
            <div class="label">BOARDING CODE</div>
            <input type="text" id="pass" placeholder="さんこいち">

            <button onclick="unlock()">CHECK IN</button>
        </div>

        <div class="card-footer">
            TOKYO → SHINJUKU  
            <span class="date">2026.06.20-21</span>
        </div>
    </div>
</div>

<style>
    #lock-screen {
        position: fixed;
        inset: 0;
        background: rgba(255, 255, 255, 0.55);
        backdrop-filter: blur(10px);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
    }

    .lock-card {
        width: 85%;
        max-width: 360px;
        background: rgba(255,255,255,0.75);
        border-radius: 18px;
        padding: 25px 22px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        border: 1px solid rgba(0,0,0,0.08);
        animation: fadeIn 0.5s ease;
        font-family: "Helvetica Neue", sans-serif;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .card-header {
        font-size: 0.9rem;
        letter-spacing: 2px;
        color: #444;
        border-bottom: 1px dashed #bbb;
        padding-bottom: 8px;
        margin-bottom: 18px;
        text-align: center;
    }

    .label {
        font-size: 0.75rem;
        letter-spacing: 1px;
        color: #666;
        margin-bottom: 6px;
    }

    #lock-screen input {
        width: 100%;
        padding: 12px;
        font-size: 18px;
        border-radius: 10px;
        border: 1px solid #ccc;
        margin-bottom: 18px;
        text-align: center;
        outline: none;
        background: rgba(255,255,255,0.9);
    }

    #lock-screen button {
        width: 100%;
        padding: 12px;
        font-size: 15px;
        border-radius: 10px;
        border: none;
        background: #d8a7b1;
        color: #fff;
        cursor: pointer;
        letter-spacing: 1px;
        transition: 0.2s;
    }

    #lock-screen button:hover {
        background: #c48d9a;
    }

    .card-footer {
        margin-top: 20px;
        font-size: 0.8rem;
        color: #555;
        text-align: center;
        border-top: 1px dashed #bbb;
        padding-top: 10px;
    }

    .card-footer .date {
        display: block;
        font-size: 0.75rem;
        margin-top: 4px;
        color: #777;
    }
</style>

<script>
function unlock() {
    const p = document.getElementById("pass").value.trim();
    if (p === "さんこいち") {
        document.getElementById("lock-screen").style.display = "none";
    } else {
        alert("BOARDING CODE ERROR");
    }
}
</script>


<!-- 本編 -->

<section>
    <h2>旅の概要</h2>
    <div class="content-box">
        <p>ここに旅の概要が入るよ。</p>
    </div>
</section>

<section>
    <h2>日程</h2>
    <div class="content-box">
        <p>ここに日程が入るよ。</p>
    </div>
</section>

<section>
    <h2>持ち物</h2>
    <div class="content-box">
        <p>ここに持ち物リストが入るよ。</p>
    </div>
</section>

<section>
    <h2>宿泊情報</h2>
    <div class="content-box">
        <p>ここに宿泊情報が入るよ。</p>
    </div>
</section>

<!-- 背景クロスフェード -->
<script>
    const backgrounds = [
        "url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e')",
        "url('https://images.unsplash.com/photo-1501785888041-af3ef285b470')",
        "url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee')",
        "url('https://images.unsplash.com/photo-1500048993959-dc65b0c31f52')"
    ];

    const bg1 = document.getElementById("bg1");
    const bg2 = document.getElementById("bg2");

    let currentIndex = 0;
    bg1.style.backgroundImage = backgrounds[0];

    function changeBackground(index) {
        if (index === currentIndex) return;

        bg2.style.backgroundImage = backgrounds[index];
        bg2.style.opacity = 1;

        setTimeout(() => {
            bg1.style.backgroundImage = backgrounds[index];
            bg2.style.opacity = 0;
            currentIndex = index;
        }, 1200);
    }

    const sections = document.querySelectorAll("section");

    window.addEventListener("scroll", () => {
        let index = 0;

        sections.forEach((sec, i) => {
            const rect = sec.getBoundingClientRect();
            if (rect.top <= window.innerHeight * 0.4) {
                index = i;
            }
        });

        changeBackground(index);
    });
</script>

</body>
</html>
