<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>さんこいち旅行 2026/06/20-21</title>

<style>
    body {
        margin: 0;
        font-family: sans-serif;
        color: #fff;
    }

    /* 背景レイヤー（クロスフェード用） */
    .bg-layer {
        position: fixed;
        inset: 0;
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        transition: opacity 1.2s ease-in-out;
        z-index: -1;
    }
    #bg1 { opacity: 1; }
    #bg2 { opacity: 0; }

    /* セクション */
    section {
        min-height: 100vh;
        padding: 60px 20px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        backdrop-filter: brightness(0.75);
    }

    h2 {
        margin-bottom: 20px;
        font-size: 2rem;
        text-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }

    .content-box {
        background: rgba(0,0,0,0.35);
        padding: 20px;
        border-radius: 12px;
        backdrop-filter: blur(4px);
    }
</style>
</head>

<body>

<!-- 背景レイヤー（2枚重ねてクロスフェード） -->
<div id="bg1" class="bg-layer"></div>
<div id="bg2" class="bg-layer"></div>

<!-- ここから本編 -->

<section>
    <h2>旅の概要</h2>
    <div class="content-box">
        <p>ここに旅の概要が入るよ。</p>
    </div>
</section>

<section>
    <h2>日程</h2>
    <div class="content-box">
        <p>ここに日程が入るよ。</p>
    </div>
</section>

<section>
    <h2>持ち物</h2>
    <div class="content-box">
        <p>ここに持ち物リストが入るよ。</p>
    </div>
</section>

<section>
    <h2>宿泊情報</h2>
    <div class="content-box">
        <p>ここに宿泊情報が入るよ。</p>
    </div>
</section>

<!-- 背景切り替えスクリプト（クロスフェード） -->
<script>
    const backgrounds = [
        "url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e')", // 海
        "url('https://images.unsplash.com/photo-1501785888041-af3ef285b470')", // 山
        "url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee')", // 街
        "url('https://images.unsplash.com/photo-1500048993959-dc65b0c31f52')"  // 夜景
    ];

    const bg1 = document.getElementById("bg1");
    const bg2 = document.getElementById("bg2");

    let currentIndex = 0;
    bg1.style.backgroundImage = backgrounds[0];

    function changeBackground(index) {
        if (index === currentIndex) return;

        bg2.style.backgroundImage = backgrounds[index];
        bg2.style.opacity = 1;

        setTimeout(() => {
            bg1.style.backgroundImage = backgrounds[index];
            bg2.style.opacity = 0;
            currentIndex = index;
        }, 1200);
    }

    const sections = document.querySelectorAll("section");

    window.addEventListener("scroll", () => {
        let index = 0;

        sections.forEach((sec, i) => {
            const rect = sec.getBoundingClientRect();
            if (rect.top <= window.innerHeight * 0.4) {
                index = i;
            }
        });

        changeBackground(index);
    });
</script>

</body>
</html>
